jwt:
    secret: ${JWT_SECRET:Y2FtcHVzX2NoYXRfcGxhdGZvcm1fc2VjcmV0X2tleV9hdF9sZWFzdF8zMl9ieXRlcw==}
    issuer: campus-chat
    expire-days: 7

# MinIO
minio:
    endpoint: http://localhost:19000
    access-key: ccjj
    secret-key: 3177587750CCjj+1
    bucket: campus-chat

campus:
    checkin:
        max-radius-meters: 500
        late-minutes: 10
        qr-secret: "cvfdjnvcdf_csdbcdce3efdsjn1w1hsh"
        qr-ttl-seconds: 60          # 二维码有效期（秒），前端每 10 秒刷新一次
        qr-size: 280                # 二维码 PNG 像素尺寸
    message:
        recall-window-seconds: 120
    security:
        login-fail-lock-threshold: 5
        login-fail-lock-minutes: 5



logging:
    level:
        com.ccj.campus.chat: info
        org.apache.rocketmq: warn
        com.baomidou.mybatisplus: error
        com.ccj.campus.chat.mapper: error