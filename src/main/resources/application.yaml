server:
    tomcat:
        threads:
            max: 800
            min-spare: 100
        max-connections: 20000
        accept-count: 1000
        # 【新增】连接超时，避免慢连接占用线程
        connection-timeout: 5000
    address: 0.0.0.0
    port: 8080
    servlet:
        context-path: /capi

spring:
    websocket:
        max-sessions: 5000
    application:
        name: campus-chat
    datasource:
        driver-class-name: org.postgresql.Driver
        url: jdbc:postgresql://localhost:15432/campus_chat?stringtype=unspecified
        username: root
        password: 32e1615de259f13b3ad7
        hikari:
            maximum-pool-size: 100    # 【优化】50 → 100，Tomcat 500 线程争抢 50 连接是主要瓶颈
            minimum-idle: 20          # 【优化】10 → 20，保持更多空闲连接
            connection-timeout: 5000  # 【新增】获取连接超时 5s，避免无限等待
            max-lifetime: 1800000     # 【新增】连接最大存活 30 分钟
            leak-detection-threshold: 30000  # 【新增】连接泄漏检测 30s
    redis:
        host: localhost
        port: 17379
        password: 20020104CCjj+1
        database: 0
        timeout: 3000ms             # 【优化】5000ms → 3000ms，Redis 操作不应超过 3s
        lettuce:
            pool:
                max-active: 128      # 【优化】32 → 64，每次 CONNECT/SEND/SUBSCRIBE 都操作 Redis
                max-idle: 64        # 【优化】16 → 32
                min-idle: 16        # 【优化】4 → 8
                max-wait: 8000ms    # 【新增】获取连接最大等待时间
    jackson:
        date-format: yyyy-MM-dd HH:mm:ss
        time-zone: Asia/Shanghai
        default-property-inclusion: non_null
    servlet:
        multipart:
            max-file-size: 50MB
            max-request-size: 50MB

# RocketMQ
rocketmq:
    name-server: localhost:9876
    producer:
        group: campus_chat_producer
        send-message-timeout: 30000
        retry-times-when-send-async-failed: 2

mybatis-plus:
    mapper-locations: classpath*:/mapper/**/*.xml
    configuration:
        map-underscore-to-camel-case: true
        log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    global-config:
        db-config:
            logic-delete-field: deleted
            logic-delete-value: true
            logic-not-delete-value: false

jwt:
    secret: ${JWT_SECRET:Y2FtcHVzX2NoYXRfcGxhdGZvcm1fc2VjcmV0X2tleV9hdF9sZWFzdF8zMl9ieXRlcw==}
    issuer: campus-chat
    expire-days: 7

# MinIO
minio:
    endpoint: http://localhost:19000
    access-key: ccjj
    secret-key: 3177587750CCjj+1
    bucket: campus-chat

campus:
    checkin:
        max-radius-meters: 500
        late-minutes: 10
        qr-secret: "cvfdjnvcdf_csdbcdce3efdsjn1w1hsh"
        qr-ttl-seconds: 60
        qr-size: 280
    message:
        recall-window-seconds: 120
    security:
        login-fail-lock-threshold: 5
        login-fail-lock-minutes: 5

logging:
    level:
        com.ccj.campus.chat: info
        org.apache.rocketmq: warn
        com.baomidou.mybatisplus: error
        com.ccj.campus.chat.mapper: error
        # 【新增】压测时打开 HikariCP 日志，观察连接池使用情况
        # com.zaxxer.hikari: debug