server:
    tomcat:
        threads:
            max: 500          # 默认200，提高到500
            min-spare: 50     # 最小空闲线程
        max-connections: 10000  # 最大连接数
        accept-count: 500   # 连接队列大小
    address: 0.0.0.0
    port: 8080
    servlet:
        context-path: /capi

spring:
    websocket:
        max-sessions: 1000  # 允许的最大WebSocket会话数
    application:
        name: campus-chat
    datasource:
        driver-class-name: org.postgresql.Driver
        url: jdbc:postgresql://localhost:15432/campus_chat?stringtype=unspecified
        username: root
        password: 32e1615de259f13b3ad7
        hikari:
            maximum-pool-size: 50
            minimum-idle: 10
    redis:
        host: localhost
        port: 17379
        password: 20020104CCjj+1
        database: 0
        timeout: 5000ms
        lettuce:
            pool:
                max-active: 32
                max-idle: 16
                min-idle: 4
    jackson:
        date-format: yyyy-MM-dd HH:mm:ss
        time-zone: Asia/Shanghai
        default-property-inclusion: non_null
    servlet:
        multipart:
            max-file-size: 50MB
            max-request-size: 50MB

# RocketMQ
rocketmq:
    name-server: localhost:9876
    producer:
        group: campus_chat_producer
        send-message-timeout: 10000
        retry-times-when-send-async-failed: 2

mybatis-plus:
    mapper-locations: classpath*:/mapper/**/*.xml
    configuration:
        map-underscore-to-camel-case: true
        log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    global-config:
        db-config:
            logic-delete-field: deleted
            logic-delete-value: true
            logic-not-delete-value: false

